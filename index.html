<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Empire: Pro</title>
    <style>
        body { background-color: #111; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        .stats-container { text-align: center; margin-bottom: 10px; }
        .cookies-display { font-size: 42px; font-weight: bold; color: #f1c40f; }
        
        #cookie { font-size: 140px; cursor: pointer; user-select: none; transition: transform 0.05s; margin: 15px 0; display: inline-block; }
        #cookie:active { transform: scale(0.92); }

        .upgrade-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 90%; max-width: 400px; }
        .card { background: #222; padding: 12px; border-radius: 12px; border: 1px solid #444; text-align: center; }
        
        button { width: 100%; padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .buy-btn { background: #27ae60; color: white; }
        .buy-btn:disabled { background: #333; color: #666; }

        .settings-bar { margin-top: 15px; display: flex; gap: 10px; }
        .menu-btn { background: #555; color: white; padding: 10px 20px; }

        /* Modal / Menu */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #2c3e50; padding: 20px; border-radius: 15px; width: 280px; z-index: 100; border: 2px solid #34495e; }
        .setting-row { display: flex; justify-content: space-between; margin: 15px 0; align-items: center; }
        
        #leaderboard-list { text-align: left; background: #1a252f; padding: 10px; border-radius: 5px; max-height: 150px; overflow-y: auto; font-size: 14px; }
    </style>
</head>
<body>

    <div class="stats-container">
        <div class="cookies-display"><span id="count">0</span> 🍪</div>
        <div style="color: #aaa;">Clicks: <span id="val-click">1</span> | Auto: <span id="val-auto">0</span>/s</div>
    </div>

    <div id="cookie">🍪</div>

    <div class="upgrade-grid">
        <div class="card">
            <button id="buy-click" class="buy-btn">Double Clicks</button>
            <div style="font-size: 12px; margin-top:5px;">Cost: <span id="cost-click">2</span></div>
        </div>
        <div class="card">
            <button id="buy-auto" class="buy-btn">Double Auto</button>
            <div style="font-size: 12px; margin-top:5px;">Cost: <span id="cost-auto">2</span></div>
        </div>
    </div>

    <div class="settings-bar">
        <button class="menu-btn" onclick="openMenu('settings')">⚙️ Settings</button>
