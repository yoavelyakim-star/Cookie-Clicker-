<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Cookie Clicker</title>
    <style>
        body {
            background-color: #111;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .stats { font-size: 32px; margin-bottom: 10px; font-weight: bold; }
        .power { font-size: 18px; color: #aaa; margin-bottom: 20px; }
        
        #cookie {
            font-size: 150px;
            cursor: pointer;
            transition: transform 0.05s;
            user-select: none;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.1));
        }
        #cookie:active { transform: scale(0.90); }

        .panel {
            margin-top: 30px;
            background: #222;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #444;
            width: 250px;
        }

        button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 10px;
        }
        button:disabled { background-color: #333; color: #777; cursor: not-allowed; }

        .toggle-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="stats">Cookies: <span id="count">0</span></div>
    <div class="power">Click Power: +<span id="pwr">1</span> | Auto: <span id="auto-rate">0</span>/s</div>
    
    <div id="cookie">🍪</div>

    <div class="panel">
        <div id="cost-text" style="margin-bottom: 10px;">Upgrade Cost: 2</div>
        <button id="upgrade-btn" disabled>MEGA UPGRADE</button>
        
        <div class="toggle-container">
            <span>Auto-Clicker</span>
            <button id="toggle-btn" style="width: 60px; padding: 5px; margin: 0; background: #cc0000;">OFF</button>
        </div>
    </div>

    <script>
        let cookies = 0;
        let clickPower = 1;
        let autoRate = 0;
        let upgradeCost = 2;
        let autoOn = false;

        const countDisplay = document.getElementById('count');
        const pwrDisplay = document.getElementById('pwr');
        const autoDisplay = document.getElementById('auto-rate');
        const costDisplay = document.getElementById('cost-text');
        const upgradeBtn = document.getElementById('upgrade-btn');
        const toggleBtn = document.getElementById('toggle-btn');
        const cookieBtn = document.getElementById('cookie');

        // Tiny pop sound effect using web audio (no file needed!)
        function playPop() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const osc = context.createOscillator();
            const gain = context.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, context.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, context.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, context.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(context.destination);
            osc.start();
            osc.stop(context.currentTime + 0.1);
        }

        cookieBtn.addEventListener('click', () => {
            cookies += clickPower;
            playPop();
            updateDisplay();
        });

        upgradeBtn.addEventListener('click', () => {
            if (cookies >= upgradeCost) {
                cookies -= upgradeCost;
                clickPower++; // Boosts manual clicks
                autoRate++;   // Boosts automatic clicks
                upgradeCost *= 2; // Doubles the price exactly
                updateDisplay();
            }
        });

        toggleBtn.addEventListener('click', () => {
            autoOn = !autoOn;
            toggleBtn.innerText = autoOn ? "ON" : "OFF";
            toggleBtn.style.background = autoOn ? "#4CAF50" : "#cc0000";
        });

        function updateDisplay() {
            countDisplay.innerText = Math.floor(cookies);
            pwrDisplay.innerText = clickPower;
            autoDisplay.innerText = autoRate;
            costDisplay.innerText = `Upgrade Cost: ${upgradeCost}`;
            upgradeBtn.disabled = cookies < upgradeCost;
        }

        setInterval(() => {
            if (autoOn && autoRate > 0) {
                cookies += autoRate;
                updateDisplay();
            }
        }, 1000);
    </script>
</body>
</html>
