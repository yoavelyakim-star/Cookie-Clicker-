<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cookie Empire: Crash-Proof Edition</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; touch-action: manipulation; width: 100vw; height: 100vh; }
        #game-ui { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; }
        
        /* SIDEBAR IDENTITY - Visible Everywhere */
        #identity-bar { position: fixed; left: 10px; top: 10px; background: rgba(0,255,255,0.1); padding: 8px 15px; border-radius: 10px; font-size: 14px; border: 1px solid #0ff; cursor: pointer; z-index: 3000; transition: 0.3s; text-shadow: 0 0 5px #0ff; }
        #identity-bar:hover { background: rgba(0,255,255,0.3); }

        #count { font-size: 45px; color: #f1c40f; font-weight: bold; margin-bottom: 10px; }
        #cookie { font-size: 100px; cursor: pointer; user-select: none; transition: transform 0.05s; display: inline-block; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 92%; max-width: 400px; margin-top: 20px; }
        .card { background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px solid #333; text-align: center; }
        button { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; width: 100%; }
        .buy-btn { background: #27ae60; color: white; }
        .buy-btn:disabled { background: #2c3e50; color: #555; cursor: not-allowed; }
        
        /* MODALS */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 25px; border-radius: 20px; width: 85%; max-width: 350px; z-index: 1000; border: 2px solid #444; }
        
        /* TESTER UI */
        #tester-ui { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; }
        .target { position: absolute; width: 8px; height: 8px; background: #0ff; border-radius: 1px; pointer-events: none; will-change: transform; box-shadow: 0 0 3px #0ff; }
        #tester-controls { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: center; gap: 50px; } /* 1cm+ Gap */
        .ctrl-btn { width: 70px; height: 70px; border-radius: 50%; border: none; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        #tester-stats { position: absolute; top: 60px; left: 10px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; border: 1px solid #333; font-family: monospace; }
    </style>
</head>
<body>

    <div id="identity-bar" onclick="changeNick()">
        <span id="display-nick">Setting Name...</span> | <span id="high-score">0</span> pts
    </div>

    <div id="game-ui">
        <div id="count">0</div>
        <div id="cookie">🍪</div>
        <div class="grid">
            <div class="card">
                <button id="btn-click" class="buy-btn" onclick="buy('click')">Click Up</button>
                <div style="font-size:11px; margin-top:5px">Cost: <span id="c-click">2</span></div>
            </div>
            <div class="card">
                <button id="btn-auto" class="buy-btn" onclick="buy('auto')">Auto Up</button>
                <div style="font-size:11px; margin-top:5px">Cost: <span id="c-auto">2</span></div>
            </div>
        </div>
        <button onclick="openMenu()" style="background:#444; color:white; margin-top:20px; padding:10px 30px; border-radius:8px; border:1px solid #555;">⚙️ Empire Settings</button>
    </div>

    <div id="menu" class="modal">
        <h2 style="margin:0">Settings</h2>
        <div style="display:flex; justify-content:space-between; margin:20px 0;">
            <span>Auto-Buy</span>
            <input type="checkbox" id="autobuy">
        </div>
        <button onclick="startTester()" style="background:#00d4ff; color:black; padding:15px; width:100%; border:none; border-radius:8px; font-weight:bold;">🚀 CRASH TESTER 3000</button>
        <button onclick="closeMenu()" style="background:#444; color:white; width:100%; border:none; padding:10px; border-radius:8px; margin-top:10px;">Back</button>
    </div>

    <div id="tester-ui">
        <div id="tester-stats">
            Targets: <span id="target-count" style="color:#0ff">0</span><br>
            Max: <span id="max-session" style="color:#f1c40f">0</span>
        </div>
        <div id="render-area"></div>
        <div id="tester-controls">
            <button id="play-btn" class="ctrl-btn" onclick="toggleTester()" style="background:#27ae60;">▶️</button>
            <button id="exit-btn" class="ctrl-btn" onclick="confirmExit()" style="background:#c0392b; color:white;">✖️</button>
        </div>
    </div>

    <script>
        // LOAD DATA
        let state = JSON.parse(localStorage.getItem('empireDataV3')) || {
            cookies: 0, clickP: 1, autoP: 0, clickC: 2, autoC: 2, 
            nick: "Player", bestCrash: 0
        };

        function save() { localStorage.setItem('empireDataV3', JSON.stringify(state)); }

        function format(num) {
            if (num < 1000000) return Math.floor(num).toLocaleString();
            const names = ["m", "b", "t", "q", "Q", "s", "S", "o", "n", "d"];
            let unitIdx = Math.floor(Math.log10(num) / 3) - 1;
            let base = num / Math.pow(10, (unitIdx + 1) * 3);
            return base.toFixed(2) + (names[unitIdx - 1] || "e" + (unitIdx * 3));
        }

        function updateUI() {
            document.getElementById('count').innerText = format(state.cookies);
            document.getElementById('c-click').innerText = format(state.clickC);
            document.getElementById('c-auto').innerText = format(state.autoC);
            document.getElementById('display-nick').innerText = state.nick;
            document.getElementById('high-score').innerText = format(state.bestCrash);
            document.getElementById('btn-click').disabled = state.cookies < state.clickC;
            document.getElementById('btn-auto').disabled = state.cookies < state.autoC;
        }

        function changeNick() {
            let n = prompt("Enter New Nickname:", state.nick);
            if(n) state.nick = n;
            updateUI(); save();
        }

        document.getElementById('cookie').onclick = () => { state.cookies += state.clickP; updateUI(); save(); };

        function buy(type) {
            if (type === 'click' && state.cookies >= state.clickC) {
                state.cookies -= state.clickC; state.clickP *= 2; state.clickC *= 2; return true;
            } else if (type === 'auto' && state.cookies >= state.autoC) {
                state.cookies -= state.autoC; state.autoP = (state.autoP === 0) ? 1 : state.autoP * 2; state.autoC *= 2; return true;
            }
            return false;
        }

        function openMenu() { document.getElementById('menu').style.display = 'block'; }
        function closeMenu() { document.getElementById('menu').style.display = 'none'; save(); }

        // THE "IMMORTAL" CRASH TESTER
        let targets = [], testerActive = false, testerLoop = null;
        function startTester() { 
            document.getElementById('tester-ui').style.display = 'block'; 
            targets = []; document.getElementById('render-area').innerHTML = "";
            document.getElementById('target-count').innerText = "0";
        }

        function toggleTester() {
            testerActive = !testerActive;
            document.getElementById('play-btn').innerText = testerActive ? "⏸️" : "▶️";
            if(testerActive) runTester();
        }

        function runTester() {
            if(!testerActive) return;
            
            // SPAWN LOGIC - Increases difficulty
            for(let i=0; i<10; i++) {
                const el = document.createElement('div'); el.className = 'target';
                const t = { el, x: window.innerWidth/2, y: window.innerHeight/2, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15 };
                document.getElementById('render-area').appendChild(el); targets.push(t);
            }

            // GPU-ACCELERATED MOVEMENT
            const w = window.innerWidth, h = window.innerHeight;
            for(let i=0; i<targets.length; i++) {
                let t = targets[i];
                t.x += t.vx; t.y += t.vy;
                if(t.x <= 0 || t.x >= w) t.vx *= -1;
                if(t.y <= 0 || t.y >= h) t.vy *= -1;
                t.el.style.transform = `translate3d(${t.x}px, ${t.y}px, 0)`;
            }

            // SAVE MAX ON EVERY FRAME (Crash protection)
            if(targets.length > state.bestCrash) {
                state.bestCrash = targets.length;
                save(); // Immediate save to disk
            }

            document.getElementById('target-count').innerText = targets.length.toLocaleString();
            document.getElementById('max-session').innerText = targets.length.toLocaleString();
            document.getElementById('high-score').innerText = format(state.bestCrash);
            
            testerLoop = requestAnimationFrame(runTester);
        }

        function confirmExit() {
            if(confirm("Exit run? Current targets will be cleared!")) {
                testerActive = false;
                document.getElementById('tester-ui').style.display = 'none';
                targets = [];
                document.getElementById('render-area').innerHTML = "";
            }
        }

        // BACKGROUND ENGINE
        setInterval(() => {
            if (state.autoP > 0) {
                // Calculation speed fix: ensures no lag even at high numbers
                let gain = (state.autoP * state.clickP * 0.1);
                state.cookies += gain;
            }
            if (document.getElementById('autobuy').checked) {
                let cheap = state.clickC <= state.autoC ? 'click' : 'auto';
                buy(cheap);
            }
            updateUI();
        }, 100);

        updateUI();
    </script>
</body>
</html>
