<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cookie Empire: Crash Tester Edition</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; touch-action: manipulation; }
        #game-ui { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100%; position: relative; }
        #count { font-size: 45px; color: #f1c40f; font-weight: bold; margin-bottom: 10px; }
        #cookie { font-size: 100px; cursor: pointer; user-select: none; transition: 0.05s; display: inline-block; z-index: 5; }
        #cookie.pulse { animation: cookie-pulse 0.1s infinite; }
        @keyframes cookie-pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 92%; max-width: 400px; margin-top: 20px; }
        .card { background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px solid #333; text-align: center; }
        button { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; }
        .buy-btn { background: #27ae60; color: white; }
        .buy-btn:disabled { background: #2c3e50; color: #555; cursor: not-allowed; }
        .menu-btn { background: #444; color: white; margin-top: 20px; width: auto; padding: 10px 30px; }

        /* MODALS */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 25px; border-radius: 20px; width: 85%; max-width: 350px; z-index: 1000; border: 2px solid #444; box-shadow: 0 0 50px black; }
        .row { display: flex; justify-content: space-between; margin: 15px 0; align-items: center; }
        
        /* TESTER UI */
        #tester-ui { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; }
        .target { position: absolute; width: 10px; height: 10px; background: cyan; border-radius: 2px; }
        #tester-controls { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: center; gap: 40px; }
        .ctrl-btn { width: 70px; height: 70px; border-radius: 50%; border: none; font-size: 24px; cursor: pointer; }
        #exit-alert { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; border: 2px solid #e74c3c; padding: 20px; z-index: 3000; text-align: center; border-radius: 15px; }
    </style>
</head>
<body>

    <div id="game-ui">
        <div id="count">0</div>
        <div id="mode-badge" style="font-size:10px; color:#f39c12; margin-bottom:10px;">Mode: Visual</div>
        <div id="cookie">🍪</div>

        <div class="grid">
            <div class="card">
                <button id="btn-click" class="buy-btn" onclick="buy('click')">Upgrade Click</button>
                <div style="font-size:11px; margin-top:5px">Cost: <span id="c-click">2</span></div>
            </div>
            <div class="card">
                <button id="btn-auto" class="buy-btn" onclick="buy('auto')">Upgrade Auto</button>
                <div style="font-size:11px; margin-top:5px">Cost: <span id="c-auto">2</span></div>
            </div>
        </div>

        <button class="menu-btn" onclick="openMenu()">⚙️ Settings & Tester</button>
    </div>

    <div id="menu" class="modal">
        <h2 style="margin-top:0">Settings</h2>
        <div class="row"><span>Auto-Buy Upgrades</span><input type="checkbox" id="autobuy"></div>
        <div class="row"><span>Enable Sounds</span><input type="checkbox" id="sound-toggle"></div>
        <button onclick="startTester()" style="background:#8e44ad; color:white; padding:15px; margin-bottom:10px;">🚀 LAUNCH CRASH TESTER 3000</button>
        <button onclick="closeMenu()" style="background:#444; color:white;">Save & Close</button>
    </div>

    <div id="tester-ui">
        <div id="tester-stats" style="position:absolute; top:20px; left:20px; background:rgba(0,0,0,0.8); padding:10px; border-radius:8px; z-index:2001;">
            Targets: <span id="target-count">0</span>
        </div>
        <div id="render-area"></div>
        <div id="tester-controls">
            <button id="play-btn" class="ctrl-btn" onclick="toggleTester()" style="background:#27ae60;">▶️</button>
            <button id="exit-btn" class="ctrl-btn" onclick="confirmExit()" style="background:#c0392b; color:white;">✖️</button>
        </div>
    </div>

    <div id="exit-alert">
        <p>Exit run? Progress will be deleted!</p>
        <button onclick="actuallyExit()" style="background:#c0392b; color:white; padding:10px; border:none; border-radius:5px; margin-right:10px;">Yes, Exit</button>
        <button onclick="cancelExit()" style="background:#444; color:white; padding:10px; border:none; border-radius:5px;">Cancel</button>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('cookieCrashV1')) || {
            cookies: 0, clickP: 1, autoP: 0, clickC: 2, autoC: 2,
            manualTotal: 0, autoTotal: 0
        };

        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        const threshold = isMobile ? 20 : 40;
        const tickRate = isMobile ? 1000 : 100;

        function save() { localStorage.setItem('cookieCrashV1', JSON.stringify(state)); }

        function format(num) {
            if (num < 1000000) return Math.floor(num).toLocaleString();
            if (num < 1e33) return num.toExponential(2).replace('e+', 'e');
            const alpha = "abcdefghijklmnopqrstuvwxyz";
            let unitIdx = Math.floor(Math.log10(num) / 3) - 1;
            let base = num / Math.pow(10, (unitIdx + 1) * 3);
            let suffix = "", i = Math.floor((Math.log10(num) - 33) / 3);
            while (i >= 0) { suffix = alpha[i % 26] + suffix; i = Math.floor(i / 26) - 1; }
            return base.toFixed(2) + suffix;
        }

        function updateUI() {
            document.getElementById('count').innerText = format(state.cookies);
            document.getElementById('c-click').innerText = format(state.clickC);
            document.getElementById('c-auto').innerText = format(state.autoC);
            document.getElementById('btn-click').disabled = state.cookies < state.clickC;
            document.getElementById('btn-auto').disabled = state.cookies < state.autoC;
        }

        document.getElementById('cookie').onclick = () => {
            state.cookies += state.clickP;
            state.manualTotal += state.clickP;
            updateUI(); save();
        };

        function buy(type) {
            if (type === 'click' && state.cookies >= state.clickC) {
                state.cookies -= state.clickC; state.clickP *= 2; state.clickC *= 2;
                return true;
            } else if (type === 'auto' && state.cookies >= state.autoC) {
                state.cookies -= state.autoC; state.autoP = (state.autoP === 0) ? 1 : state.autoP * 2; state.autoC *= 2;
                return true;
            }
            return false;
        }

        function openMenu() { document.getElementById('menu').style.display = 'block'; }
        function closeMenu() { document.getElementById('menu').style.display = 'none'; save(); }

        let targets = [], testerActive = false, testerLoop = null;
        function startTester() { closeMenu(); document.getElementById('tester-ui').style.display = 'block'; resetTester(); }
        function resetTester() { targets = []; document.getElementById('render-area').innerHTML = ""; document.getElementById('target-count').innerText = "0"; testerActive = false; document.getElementById('play-btn').innerText = "▶️"; cancelAnimationFrame(testerLoop); }
        function toggleTester() { testerActive = !testerActive; document.getElementById('play-btn').innerText = testerActive ? "⏸️" : "▶️"; if(testerActive) runTester(); }
        
        function runTester() {
            if(!testerActive) return;
            for(let i=0; i<5; i++) spawnTarget();
            const w = window.innerWidth, h = window.innerHeight;
            targets.forEach(t => {
                t.x += t.vx; t.y += t.vy;
                if(t.x <= 0 || t.x >= w) t.vx *= -1;
                if(t.y <= 0 || t.y >= h) t.vy *= -1;
                t.el.style.transform = `translate3d(${t.x}px, ${t.y}px, 0)`;
            });
            document.getElementById('target-count').innerText = targets.length.toLocaleString();
            testerLoop = requestAnimationFrame(runTester);
        }

        function spawnTarget() {
            const el = document.createElement('div'); el.className = 'target';
            const t = { el, x: window.innerWidth/2, y: window.innerHeight/2, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10 };
            document.getElementById('render-area').appendChild(el); targets.push(t);
        }

        function confirmExit() { testerActive = false; document.getElementById('exit-alert').style.display = 'block'; }
        function cancelExit() { document.getElementById('exit-alert').style.display = 'none'; if(document.getElementById('play-btn').innerText === "⏸️") { testerActive = true; runTester(); } }
        function actuallyExit() { document.getElementById('exit-alert').style.display = 'none'; document.getElementById('tester-ui').style.display = 'none'; resetTester(); }

        let visualInt = null;
        setInterval(() => {
            const cur = state.autoP;
            const cookieEl = document.getElementById('cookie');
            const badge = document.getElementById('mode-badge');

            if (cur > 0 && cur <= threshold) {
                badge.innerText = "Mode: Visual"; cookieEl.classList.remove('pulse');
                if (!visualInt) {
                    visualInt = setInterval(() => {
                        if (state.autoP > 0 && state.autoP <= threshold) { state.cookies += state.clickP; state.autoTotal += state.clickP; updateUI(); }
                        else { clearInterval(visualInt); visualInt = null; }
                    }, 1000 / cur);
                }
            } else if (cur > threshold) {
                badge.innerText = "Mode: Math"; cookieEl.classList.add('pulse');
                let gain = (state.autoP * state.clickP * (tickRate/1000));
                state.cookies += gain; state.autoTotal += gain;
                if (visualInt) { clearInterval(visualInt); visualInt = null; }
            }

            if (document.getElementById('autobuy').checked) {
                while (true) {
                    let cheapest = state.clickC <= state.autoC ? 'click' : 'auto';
                    if (!buy(cheapest) && !buy(cheapest === 'click' ? 'auto' : 'click')) break;
                }
            }
            updateUI(); save();
        }, tickRate);

        updateUI();
    </script>
</body>
</html>
