<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cookie Empire: Crash Tester 3000</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; touch-action: manipulation; }
        #game-ui { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #count { font-size: 45px; color: #f1c40f; font-weight: bold; }
        #cookie { font-size: 100px; cursor: pointer; user-select: none; transition: 0.05s; }
        
        /* MODALS */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 25px; border-radius: 20px; width: 85%; max-width: 350px; z-index: 1000; border: 2px solid #444; box-shadow: 0 0 50px black; }
        .menu-btn { background: #444; color: white; padding: 10px 30px; border-radius: 8px; border: 1px solid #555; cursor: pointer; margin-top: 20px; }
        
        /* CRASH TESTER 3000 UI */
        #tester-ui { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; }
        #render-area { width: 100%; height: 100%; position: relative; }
        .target { position: absolute; width: 10px; height: 10px; background: cyan; border-radius: 2px; pointer-events: none; }
        
        #tester-stats { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; border: 1px solid #333; pointer-events: none; }
        #tester-controls { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: center; gap: 40px; } /* 40px gap is approx 1cm on most screens */
        
        .ctrl-btn { width: 70px; height: 70px; border-radius: 50%; border: none; font-weight: bold; cursor: pointer; font-size: 24px; display: flex; align-items: center; justify-content: center; }
        #play-btn { background: #27ae60; color: white; }
        #exit-btn { background: #c0392b; color: white; }
        
        .alert-box { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; border: 2px solid #e74c3c; padding: 20px; z-index: 3000; text-align: center; border-radius: 15px; width: 280px; }
    </style>
</head>
<body>

    <div id="game-ui">
        <div id="count">0</div>
        <div id="cookie">🍪</div>
        <button class="menu-btn" onclick="openMenu()">Settings / Crash Tester</button>
    </div>

    <div id="menu" class="modal">
        <h2>Settings</h2>
        <button onclick="startTester()" style="background:#8e44ad; color:white; padding:15px; border-radius:10px; width:100%; font-weight:bold; cursor:pointer;">🚀 LAUNCH CRASH TESTER 3000</button>
        <button onclick="closeMenu()" style="background:#444; color:white; margin-top:20px; width:100%; border:none; padding:10px; border-radius:8px;">Back</button>
    </div>

    <div id="tester-ui">
        <div id="tester-stats">
            <div style="font-size:18px; color:cyan;">Targets: <span id="target-count">0</span></div>
            <div id="performance-msg" style="font-size:12px; color:#aaa; margin-top:5px;">System Idle...</div>
        </div>
        
        <div id="render-area"></div>

        <div id="tester-controls">
            <button id="play-btn" class="ctrl-btn" onclick="toggleTester()">▶️</button>
            <button id="exit-btn" class="ctrl-btn" onclick="confirmExit()">✖️</button>
        </div>
    </div>

    <div id="exit-alert" class="alert-box">
        <p>Are you sure you want to exit in the middle of a run? All progress will be deleted!</p>
        <button onclick="actuallyExit()" style="background:#c0392b; color:white; padding:10px; border-radius:5px; border:none; margin-right:10px; cursor:pointer;">Yes, Exit</button>
        <button onclick="cancelExit()" style="background:#444; color:white; padding:10px; border-radius:5px; border:none; cursor:pointer;">Cancel</button>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('crashEmpireData')) || { cookies: 0, clickP: 1 };
        let targets = [];
        let testerActive = false;
        let testerLoop = null;
        let lastFrameTime = performance.now();

        function save() { localStorage.setItem('crashEmpireData', JSON.stringify(state)); }

        // MAIN GAME LOGIC
        document.getElementById('cookie').onclick = () => {
            state.cookies += state.clickP;
            document.getElementById('count').innerText = Math.floor(state.cookies).toLocaleString();
            save();
        };

        function openMenu() { document.getElementById('menu').style.display = 'block'; }
        function closeMenu() { document.getElementById('menu').style.display = 'none'; }

        // TESTER LOGIC
        function startTester() {
            closeMenu();
            document.getElementById('tester-ui').style.display = 'block';
            resetTester();
        }

        function resetTester() {
            targets = [];
            document.getElementById('render-area').innerHTML = "";
            document.getElementById('target-count').innerText = "0";
            document.getElementById('performance-msg').innerText = "Press Play to begin Stress Test";
            testerActive = false;
            document.getElementById('play-btn').innerText = "▶️";
        }

        function toggleTester() {
            testerActive = !testerActive;
            document.getElementById('play-btn').innerText = testerActive ? "⏸️" : "▶️";
            if(testerActive) runTester();
        }

        function runTester() {
            if(!testerActive) return;

            const now = performance.now();
            const deltaTime = now - lastFrameTime;
            lastFrameTime = now;

            // Spawn 5 new moving targets every frame to stress the system
            for(let i=0; i<5; i++) {
                spawnTarget();
            }

            const area = document.getElementById('render-area');
            const w = window.innerWidth;
            const h = window.innerHeight;

            targets.forEach(t => {
                t.x += t.vx;
                t.y += t.vy;
                if(t.x <= 0 || t.x >= w) t.vx *= -1;
                if(t.y <= 0 || t.y >= h) t.vy *= -1;
                t.el.style.transform = `translate(${t.x}px, ${t.y}px)`;
            });

            const currentFPS = 1000 / deltaTime;
            const msg = document.getElementById('performance-msg');

            // DETECTION LOGIC: If CPU is doing math but FPS drops below 30
            if (currentFPS < 30 && targets.length > 500) {
                msg.innerHTML = "<span style='color:#e67e22'>WARNING: SCREEN BOTTLENECK. Your computer is faster than your display. Upgrade your screen for a better score!</span>";
            } else {
                msg.innerText = "Performance: Stable";
            }

            document.getElementById('target-count').innerText = targets.length.toLocaleString();
            testerLoop = requestAnimationFrame(runTester);
        }

        function spawnTarget() {
            const el = document.createElement('div');
            el.className = 'target';
            const t = {
                el: el,
                x: window.innerWidth / 2,
                y: window.innerHeight / 2,
                vx: (Math.random() - 0.5) * 10,
                vy: (Math.random() - 0.5) * 10
            };
            document.getElementById('render-area').appendChild(el);
            targets.push(t);
        }

        // EXIT LOGIC
        function confirmExit() {
            testerActive = false; // Pause while asking
            document.getElementById('exit-alert').style.display = 'block';
        }

        function cancelExit() {
            document.getElementById('exit-alert').style.display = 'none';
            // Only resume if they were already playing
            if(document.getElementById('play-btn').innerText === "⏸️") {
                testerActive = true;
                runTester();
            }
        }

        function actuallyExit() {
            document.getElementById('exit-alert').style.display = 'none';
            document.getElementById('tester-ui').style.display = 'none';
            resetTester(); // Deletes all progress
        }
    </script>
</body>
</html>
